    # Subscription Plan Schemas
    NewSubscriptionPlan:
      type: object
      required:
        - merchantId
        - name
        - price
        - currency
        - recurrenceType
      properties:
        merchantId:
          type: string
          description: Merchant ID
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
        name:
          type: string
          description: Plan name
          example: Plano Premium Mensal
        price:
          type: number
          description: Price in currency units (e.g., 99.90 for R$99.90)
          example: 99.90
        currency:
          type: string
          description: ISO 4217 currency code
          example: BRL
        recurrenceType:
          type: string
          description: Recurrence type
          enum:
            - weekly
            - biweekly
            - monthly
            - custom
          example: monthly
        recurrenceInterval:
          type: integer
          description: Custom recurrence interval in months (required if recurrenceType is 'custom')
          example: 3
        endDate:
          type: string
          format: date
          description: Plan end date (ISO 8601)
          example: "2025-12-31"
        buyerMessage:
          type: string
          description: Message displayed to buyer
          example: Bem-vindo ao Plano Premium!
        paymentMethods:
          type: array
          items:
            type: string
          description: Accepted payment methods
          example: ["credit_card"]
        trial:
          type: object
          description: |-
            Optional trial period configuration. If provided, new subscribers
            will go through a trial before the first full billing cycle.
          required:
            - durationDays
            - isFree
          properties:
            durationDays:
              type: integer
              minimum: 1
              maximum: 365
              description: Duration of the trial period in days
              example: 14
            isFree:
              type: boolean
              description: Whether the trial is free. If false, `price` is required.
              example: true
            price:
              type: number
              description: Price charged during the trial period. Required when `isFree` is false.
              example: 9.90
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          description: Initial plan status
          example: active

