      security:
        - basic: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the merchant.
          schema:
            type: string
            example: 36OO3bcGjhPjjF3tzrqOGcmQuKo
      responses:
        '200':
          description: Successfully retrieved the submerchant
          content:
