      security:
        - basic: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the merchant.
          schema:
            type: string
            example: 36OO3bcGjhPjjF3tzrqOGcmQuKo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadSubMerchantDocuments'
      responses:
        '201':
          description: Successfully uploaded documents
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 422
                  error:
                    type: string
                    example: Unprocessable Entity
                  message:
                    type: string
                    example: The items list contains one of more items with invalid type.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error
  /v1/submerchants/{id}/api-keys:
    get:
      summary: Get submerchant's API Keys
      description: |-
        Get API keys from specified SubMerchant
      tags:
        - FastConnect
      security:
        - basic: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Unique identifier of the merchant.
          schema:
            type: string
            example: 36OO3bcGjhPjjF3tzrqOGcmQuKo
      responses:
        '200':
          description: Successfully retrieved the API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeys'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden

  /v1/fast-connect/sub-accounts/{id}/fees-info:
    get:
      summary: Get sub-account fees and registration info
      description: |-
        Retorna as taxas (transacionais `tx_spread` e de antecipação
        `anticipation`), a razão social e o CNPJ de uma subconta do Fast Connect.

        O retorno depende de **qual conta** está autenticada — não apenas do `:id`:

        - **Conta master:** usa o `:id` informado e retorna a subconta vinculada
          (`parent_merchant_id = master`). Id de outra master, inexistente, ou o
          próprio id do master retorna `404`. Exige `enable_fast_connect`
          habilitado na master (caso contrário, `403`).
        - **Subconta:** retorna **sempre os próprios dados**; o `:id` é
          **ignorado** (não depende de `enable_fast_connect`).

        As taxas vêm como lista plana: a rota **não** mescla overrides de bandeira
        (`brand: visa/mastercard/elo`) com a taxa padrão (`brand: null`), nem faz
        fallback para taxas default do gateway — calcular a taxa efetiva por
        bandeira/parcela é responsabilidade do consumidor.
      tags:
        - FastConnect
      security:
        - basic: [ ]
        - bearer: [ ]
      parameters:
        - name: id
          in: path
          required: true
          description: Id (KSUID) da subconta. Obrigatório quando autenticado como conta master; ignorado quando autenticado como subconta.
          schema:
            type: string
            example: 2v2TGGb4NHTQWCiMmnelz2WVOZP
      responses:
        '200':
          description: Taxas e dados cadastrais da subconta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubAccountFeesInfo'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Não autorizado
        '403':
          description: Forbidden - conta não-merchant ou Fast Connect não habilitado na master
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Fast Connect não habilitado para esta conta
        '404':
          description: Subconta não encontrada (não vinculada, inexistente, ou id do próprio master)
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Subconta não encontrada

  /v1/submerchants/{merchantId}/payout-requests:
    post:
      summary: Create payout request
      description: |-
        Creates a payout request for a submerchant in the Fast Connect context.
        
        The amount must be provided in cents (e.g., R$ 100.00 = 10000).
        Currency is always `BRL` for submerchants.
        Destination is always PIX using the submerchant's CNPJ as key.
      tags:
        - FastConnect
      security:
        - bearer: []
      parameters:
        - name: merchantId
          in: path
          required: true
          description: ID of the submerchant requesting the payout
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubMerchantPayoutRequest'
      responses:
        '201':
          description: Payout request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubMerchantPayoutRequestResponse'
        '401':
          description: Unauthorized - invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 401
                message: Unauthorized
        '403':
          description: Forbidden - Fast Connect is not enabled for this merchant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 403
                message: Fast Connect not enabled.
        '404':
          description: Submerchant not found or does not belong to the merchant master
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 404
                message: SubMerchant not found
                error: Not Found
        '422':
          description: Unprocessable Entity - Business validations failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                submerchantInactive:
                  summary: Inactive submerchant
                  value:
                    statusCode: 422
                    message: SubMerchant is not active
                    error: Unprocessable Entity
                cnpjNotConfigured:
                  summary: CNPJ not configured
                  value:
                    statusCode: 422
                    message: SubMerchant CNPJ not configured
                    error: Unprocessable Entity
                feesNotConfigured:
                  summary: Payout fees not configured
                  value:
                    statusCode: 422
                    message: Payout fees not configured
                    error: Unprocessable Entity
                invalidAmount:
                  summary: Invalid amount
                  value:
                    statusCode: 422
                    message: amount must be a positive number
                    error: Unprocessable Entity
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 500
                message: Internal server error

  /v1/payout-requests/{payoutRequestId}:
    get:
      summary: Get payout request by ID
      description: |-
        Returns the complete details of a specific payout request.
      tags:
        - FastConnect
      security:
        - bearer: []
      parameters:
        - name: payoutRequestId
          in: path
          required: true
          description: ID of the payout request
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
      responses:
        '200':
          description: Payout request found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayoutRequest'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 401
                message: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 403
                message: Forbidden
        '404':
          description: Not Found - payout request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 404
                message: Payout request not found
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                statusCode: 500
                message: Internal server error

  /v1/payout-requests:
    get:
      summary: List payout requests
      description: |-
        Lists all payout requests with support for filters and pagination.
      tags:
        - FastConnect
      security:
        - bearer: []
      parameters:
        - name: merchantId
          in: query
          required: false
          description: Filter by submerchant ID
          schema:
            type: string
            example: 36OO3bcGjhPjjF3tzrqOGcmQuKo
        - name: status
          in: query
          required: false
          description: Filter by request status
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
            example: pending
        - name: currency
          in: query
          required: false
          description: Filter by currency
          schema:
            type: string
            example: BRL
        - name: createdAt
          in: query
          required: false
          description: Filter by creation date
          schema:
            type: string
            format: date
            example: '2025-12-01'
        - name: processedAt
          in: query
          required: false
          description: Filter by processing date
          schema:
            type: string
