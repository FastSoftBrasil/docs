    # Cards API Schemas
    RegisterCard:
      type: object
      required:
        - customerId
        - number
        - holderName
        - expirationMonth
        - expirationYear
        - cvv
      properties:
        customerId:
          type: string
          description: Customer ID who owns the card
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
        number:
          type: string
          description: Card number
          example: "4111111111111111"
        holderName:
          type: string
          description: Name printed on card
          example: JOHN DOE
        expirationMonth:
          type: string
          minLength: 2
          maxLength: 2
          description: Expiration month (01-12)
          example: "12"
        expirationYear:
          type: string
          minLength: 4
          maxLength: 4
          description: Expiration year (YYYY)
          example: "2028"
        cvv:
          type: string
          minLength: 3
          description: Security code
          example: "123"
        alias:
          type: string
          description: Optional alias for the card
          example: My Visa Card
        validateCard:
          type: boolean
          default: true
          description: |-
            Whether to validate the card with a test transaction.
            When true, a small amount (up to R$ 2.00) is charged and must be confirmed
            via the /cards/{id}/activate endpoint.
          example: true

    RegisterCardResponse:
      type: object
      properties:
        id:
          type: string
          description: Card token ID
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
        token:
          type: string
          description: Card token for future reference
          example: tok_abc123xyz
        maskedNumber:
          type: string
          nullable: true
          description: Masked card number (last 4 digits)
          example: "****1111"
        status:
          type: string
          enum:
            - pending_validation
            - active
          description: Card status
          example: pending_validation
        pendingActivation:
          type: boolean
          description: Whether card requires activation
          example: true
        activation:
          type: object
          nullable: true
          description: Activation instructions (only when validateCard=true)
          properties:
            required:
              type: boolean
              example: true
            message:
              type: string
              example: Verifique o valor da transacao de teste na fatura do cartao e use o endpoint /cards/:id/activate

    CardListItem:
      type: object
      properties:
        id:
          type: string
          description: Card token ID
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
        token:
          type: string
          description: Card token
          example: tok_abc123xyz
        maskedNumber:
          type: string
          nullable: true
          description: Masked card number
          example: "****1111"
        brand:
          type: string
          description: Card brand
          example: visa
        expirationMonth:
          type: string
          description: Expiration month
          example: "12"
        expirationYear:
          type: string
          description: Expiration year
          example: "2028"
        status:
          type: string
          enum:
            - pending_validation
            - active
            - inactive
          description: Card status
          example: active
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:30:00.000Z"

    CardDetail:
      type: object
      properties:
        id:
          type: string
          description: Card token ID
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
        token:
          type: string
          description: Card token
          example: tok_abc123xyz
        maskedNumber:
          type: string
          nullable: true
          description: Masked card number
          example: "****1111"
        brand:
          type: string
          description: Card brand
          example: visa
        expirationMonth:
          type: string
          description: Expiration month
          example: "12"
        expirationYear:
          type: string
          description: Expiration year
          example: "2028"
        status:
          type: string
          enum:
            - pending_validation
            - active
            - inactive
          description: Card status
          example: active
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2024-01-15T10:30:00.000Z"

    # New schemas added for missing endpoints and DTO gaps

    RefundResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - refunded
            - pending
            - refused
            - failed
          description: Result status of the refund operation
          example: refunded
        reason:
          type: string
          nullable: true
          description: Reason from the PSP (null if not provided)
          example: null
        pspRefundRefId:
          type: string
          nullable: true
          description: PSP reference ID for the refund transaction
          example: "ref_abc123"

    BrowserInfo:
      type: object
      description: Browser data collected from the customer's browser for 3DS authentication.
      required:
        - userAgent
        - ipAddress
      properties:
        userAgent:
          type: string
          description: Browser user agent string
          example: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
        ipAddress:
          type: string
          description: Customer IP address
          example: "177.128.144.97"
        acceptHeader:
          type: string
          description: Browser Accept header value
          example: "text/html,application/xhtml+xml"
        language:
          type: string
          description: Browser language
          example: "pt-BR"
        timezoneOffset:
          type: integer
          description: Timezone offset in minutes from UTC
          example: -180
        javascriptEnabled:
          type: boolean
          description: Whether JavaScript is enabled
          example: true
        javaEnabled:
          type: boolean
          description: Whether Java is enabled
          example: false
        screenWidth:
          type: integer
          description: Screen width in pixels
          example: 1920
        screenHeight:
          type: integer
          description: Screen height in pixels
          example: 1080
        colorDepth:
          type: integer
          description: Screen color depth in bits
          example: 24

    CreditCardThreeDS:
      type: object
      description: |-
        3D Secure authentication data for BYO-3DS (Bring Your Own) flow.
        Obtain this object from the FastPay Security SDK or from
        POST /v1/three-ds/challenge-result after the challenge completes.
      required:
        - type
        - state
      properties:
        type:
          type: string
          description: Type of 3DS authentication (e.g. "full")
          example: full
        state:
          type: string
          enum:
            - success
            - failure
            - unenrolled
            - error
            - unsupported_brand
            - disabled
          description: |-
            Authentication state. Only `success` allows the charge to proceed
            when 3DS is required by the merchant's PSP configuration.
          example: success
        mode:
          type: string
          description: Authentication mode (e.g. "frictionless" or "challenge")
          example: frictionless
        cryptogram:
          type: string
          description: |-
            CAVV / Authentication Value — Base64 encoded cryptogram generated
            during 3DS authentication. Required for successful 3DS authentication.
          example: "Vt5xwasruB0Q6qRoG9mpzdRPqQs="
        eci:
          type: string
          description: |-
            Electronic Commerce Indicator. Common values: `05` (authenticated),
            `06` (attempted), `07` (not authenticated).
          example: "05"
        version:
          type: string
          description: 3DS protocol version (e.g. "2.1.0", "2.2.0")
          example: "2.2.0"
        directoryServerTransactionId:
          type: string
          description: Directory Server Transaction ID (from card scheme)
          example: "607bb317-8d24-45a7-a3c0-7ae1fdca56d0"
        threeDsServerTransactionId:
          type: string
          description: 3DS Server Transaction ID
          example: "59588a8b-955e-4aa8-bae1-338bbfdba8fa"
        acsTransactionId:
          type: string
          description: ACS Transaction ID (from issuer bank)
          example: "6bf18a7a-3a7b-488f-bce1-3da96c73e746"
        deviceData:
          type: object
          description: Device / browser data collected during authentication
          properties:
            acceptHeader:
              type: string
            userAgentHeader:
              type: string
            browserLanguage:
              type: string
            browserScreenWidth:
              type: integer
            browserScreenHeight:
              type: integer
            browserJavaEnabled:
              type: boolean
            browserColorDepth:
              type: string
            timeZone:
              type: string
            browserJavascriptEnabled:
              type: boolean
            channel:
              type: string
        challenge:
          type: object
          description: Challenge configuration
          properties:
            returnUrl:
              type: string
              format: uri
              description: URL to return to after the challenge completes
              example: "https://merchant.com/3ds/return"

    ThreeDSAuthenticateRequest:
      type: object
      required:
        - amount
        - currency
        - card
        - browser
      properties:
        amount:
          type: number
          description: Transaction amount in the currency of the transaction
          example: 100.00
        currency:
          type: string
          description: ISO 4217 currency code
          example: BRL
        card:
          type: object
          required:
            - number
            - expirationMonth
            - expirationYear
          properties:
            number:
              type: string
              description: Card number
              example: "4111111111111111"
            holderName:
              type: string
              description: Cardholder name
              example: John Doe
            expirationMonth:
              type: string
              description: Expiration month (1-12, 1-2 digits)
              example: "12"
            expirationYear:
              type: string
              description: Expiration year (4 digits)
              example: "2025"
        browser:
          $ref: '#/components/schemas/BrowserInfo'

    ThreeDSAuthenticateResponse:
      type: object
      properties:
        authenticationId:
          type: string
          description: 3DS Authentication ID — pass this to submit/cancel/challenge-result
          example: tdsa_1QmCRMJM0r9zBvr4OVmMRa6X
        status:
          type: string
          enum:
            - requires_submission
            - requires_challenge
            - succeeded
            - failed
            - error
            - canceled
            - processing
          description: Current authentication status
          example: requires_submission
        fingerprintingUrl:
          type: string
          nullable: true
          description: |-
            URL to render in a hidden iframe. Listen for postMessage events
            with `fingerprintingResult` and then call POST /v1/three-ds/submit.
          example: "https://hooks.stripe.com/three_d_secure/fingerprint/acct_xxx/tdsa_xxx"
        challengeUrl:
          type: string
          nullable: true
          description: |-
            URL to render in a visible iframe when status is `requires_challenge`.
          example: "https://hooks.stripe.com/three_d_secure/challenge/acct_xxx/tdsa_xxx"
        outcome:
          type: string
          nullable: true
          enum:
            - authenticated
            - informational
            - attempt_acknowledged
            - rejected
            - denied
            - abandoned
            - not_supported
            - processing_error
            - internal_error
            - canceled
          description: Authentication outcome (only present in terminal states)
          example: authenticated

    ThreeDSSubmitRequest:
      type: object
      required:
        - authenticationId
      properties:
        authenticationId:
          type: string
          description: 3DS Authentication ID from POST /v1/three-ds/authenticate
          example: tdsa_1QmCRMJM0r9zBvr4OVmMRa6X
        fingerprintingResult:
          type: string
          description: |-
            Base64-encoded fingerprinting result obtained from the hidden iframe
            postMessage. Omit if no fingerprinting step occurred.
          example: "VGhpcyBpcyBhIHNhbXBsZSciAzRFMgTWV0aG9kIFJlc3VsdA=="

    ThreeDSSubmitResponse:
      type: object
      properties:
        authenticationId:
          type: string
          description: 3DS Authentication ID
          example: tdsa_1QmCRMJM0r9zBvr4OVmMRa6X
        status:
          type: string
          enum:
            - requires_challenge
            - succeeded
            - failed
            - error
            - processing
          description: Updated authentication status after submit
          example: requires_challenge
        challengeUrl:
          type: string
          nullable: true
          description: Challenge URL — render in iframe when status is `requires_challenge`
          example: "https://hooks.stripe.com/three_d_secure/challenge/acct_xxx/tdsa_xxx"
        outcome:
          type: string
          nullable: true
          description: Authentication outcome (only present in terminal states)
          example: authenticated

    ThreeDSChallengeResult:
      type: object
      description: Final result of a 3DS challenge, including data needed to complete the charge.
      properties:
        type:
          type: string
          description: Type of 3DS authentication
          example: full
        state:
          type: string
          enum:
            - success
            - failure
            - unenrolled
            - error
            - unsupported_brand
            - disabled
          description: Authentication state
          example: success
        cryptogram:
          type: string
          nullable: true
          description: CAVV / Authentication Value
          example: "Vt5xwasruB0Q6qRoG9mpzdRPqQs="
        directoryServerTransactionId:
          type: string
          nullable: true
          description: Directory Server Transaction ID
          example: "607bb317-8d24-45a7-a3c0-7ae1fdca56d0"
        threeDsServerTransactionId:
          type: string
          nullable: true
          description: 3DS Server Transaction ID
          example: "59588a8b-955e-4aa8-bae1-338bbfdba8fa"
        acsTransactionId:
          type: string
          nullable: true
          description: ACS Transaction ID
          example: "6bf18a7a-3a7b-488f-bce1-3da96c73e746"
        eci:
          type: string
          nullable: true
          description: Electronic Commerce Indicator
          example: "05"
        version:
          type: string
          nullable: true
          description: 3DS protocol version
          example: "2.2.0"

    SubAccountFeesInfo:
      type: object
      properties:
        merchant:
          type: object
          description: Dados cadastrais da subconta
          properties:
            id:
              type: string
              description: Id (KSUID) da subconta
              example: 2v2TGGb4NHTQWCiMmnelz2WVOZP
            legalName:
              type: string
              description: Razão social
              example: ACME PAGAMENTOS DIGITAIS LTDA
            companyTaxId:
              type: string
              description: CNPJ (somente dígitos, 14 caracteres)
              example: '12345678000190'
        fees:
          type: array
          description: |-
            Linhas de taxa próprias da subconta (lista plana, ordenada por
            tipo/método/moeda/bandeira). Array vazio quando a subconta não possui
            taxas próprias configuradas.
          items:
            type: object
            properties:
              feeType:
                type: string
                enum:
                  - tx_spread
                  - anticipation
                description: 'Tipo da taxa: tx_spread (transacional) ou anticipation (antecipação)'
                example: tx_spread
              paymentMethod:
                type: string
                nullable: true
                description: 'Método de pagamento (ex.: credit_card, pix, qrcode). null para taxas sem método associado.'
                example: credit_card
              currencyCode:
                type: string
                nullable: true
                description: 'Código da moeda (ISO 4217, ex.: BRL, USD). null quando não se aplica.'
                example: BRL
              brand:
                type: string
                nullable: true
                description: 'Bandeira do cartão (visa, mastercard, elo). null representa a taxa padrão (vale para qualquer bandeira sem override).'
                example: visa
              definition:
                type: object
                properties:
                  fixed:
                    type: number
                    description: Taxa fixa por transação, na moeda do item.
                    example: 0.5
                  percentages:
                    type: array
                    items:
                      type: number
                    description: 'Taxa percentual por parcela: índice 0 = à vista (1x) … índice 11 = 12x. Um único valor para taxas sem parcelamento.'
                    example: [2.99, 3.49, 3.99, 4.49, 4.99, 5.49, 5.99, 6.49, 6.99, 7.49, 7.99, 8.49]
