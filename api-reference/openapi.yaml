                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized

  /v1/cards/{id}:
    get:
      summary: Get card by ID
      description: Returns details of a specific card.
      tags:
        - Cards
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique card identifier
          schema:
            type: string
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
      responses:
        '200':
          description: Successfully retrieved card
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDetail'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Card not found
    delete:
      summary: Delete a card
      description: |-
        Deletes a registered card. The card is removed from the PSP and the
        token is revoked from the vault.
      tags:
        - Cards
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique card identifier
          schema:
            type: string
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
      responses:
        '200':
          description: Card deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Deleted card ID
                    example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
                  deleted:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Card deleted successfully
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Card not found

  /v1/refunds:
    post:
      summary: Request a refund
      description: |-
        Requests a **full refund** (estorno) for a charge that has `paid` status.
        Partial refunds are not supported — the entire charge amount is reversed.

        Works for both PIX and credit card payment methods.

        On success the charge status transitions to `refunded` and the
        `charge.refunded` webhook event is fired to all configured endpoints
        and the charge's `postbackUrl` (if set).
      tags:
        - Charges
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - chargeId
                - reason
              properties:
                chargeId:
                  type: string
                  description: ID of the charge to refund. Must be in `paid` status.
                  example: 2vorkDcXyvzifL63YX09S9VqcnI
                reason:
                  type: string
                  description: Reason for the refund.
                  example: Customer requested cancellation
      responses:
        '201':
          description: Refund requested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundResponse'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable Entity - charge is not in paid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/three-ds/authenticate:
    post:
      summary: Initiate 3DS authentication
      description: |-
        Creates a 3D Secure authentication object. The response may include
        `fingerprintingUrl` (render in a hidden iframe and listen for postMessage)
        or `challengeUrl` (render in a visible iframe for user challenge).

        **Authentication:** Uses the merchant's **public/publishable key**
        (`pk_...`) in the Authorization header as Basic auth username.
      tags:
        - 3D Secure
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreeDSAuthenticateRequest'
      responses:
        '200':
          description: Authentication initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeDSAuthenticateResponse'
        '404':
          description: No 3DS provider configured for this merchant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/three-ds/submit:
    post:
      summary: Submit 3DS authentication
      description: |-
        Submits a 3DS authentication after optional fingerprinting.
        Pass `fingerprintingResult` if you received it from the iframe postMessage.
        Returns updated status and may include `challengeUrl` if a challenge is required.

        **Authentication:** Uses the merchant's public/publishable key (`pk_...`).
      tags:
        - 3D Secure
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreeDSSubmitRequest'
      responses:
        '200':
          description: Authentication submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeDSSubmitResponse'
        '404':
          description: No 3DS provider configured or authentication not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/three-ds/cancel:
    post:
      summary: Cancel 3DS authentication
      description: |-
        Cancels a 3DS authentication that is in `requires_submission` or
        `requires_challenge` status.

        **Authentication:** Uses the merchant's public/publishable key (`pk_...`).
      tags:
        - 3D Secure
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authenticationId
              properties:
                authenticationId:
                  type: string
                  description: 3DS Authentication ID to cancel
                  example: tdsa_1QmCRMJM0r9zBvr4OVmMRa6X
      responses:
        '200':
          description: Authentication cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticationId:
                    type: string
                    example: tdsa_1QmCRMJM0r9zBvr4OVmMRa6X
                  status:
                    type: string
                    example: canceled
        '404':
          description: No 3DS provider configured or authentication not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/three-ds/challenge-result:
    post:
      summary: Get 3DS challenge result
      description: |-
        Retrieves the final result of a 3DS challenge, including the cryptogram
        and transaction IDs needed to complete the charge via POST /v1/charges
        with the `threeDS` payment method field.

        **Authentication:** Uses the merchant's public/publishable key (`pk_...`).
      tags:
        - 3D Secure
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authenticationId
              properties:
                authenticationId:
                  type: string
                  description: 3DS Authentication ID
                  example: 3ds_auth_123456
      responses:
        '200':
          description: Challenge result retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeDSChallengeResult'
        '404':
          description: No 3DS provider configured or authentication not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/charges/{id}/resume-3ds:
    post:
      summary: Resume charge after managed 3DS authentication
      description: |-
        Called by the 3DS micro-frontend (or your own integration) after the
        buyer completes the managed 3DS authentication. Processes the charge
        using the provided 3DS result and fires postback/webhook events.

        The charge must be in `authentication_required` status.

        **Authentication:** Uses the merchant's public/publishable key (`pk_...`).
      tags:
        - 3D Secure
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Charge ID
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - threeDS
              properties:
                threeDS:
                  $ref: '#/components/schemas/CreditCardThreeDS'
      responses:
        '200':
          description: Charge resumed and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedCharge'
        '401':
          description: Unauthorized - invalid public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Charge is not in authentication_required status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/charges/{id}/resend-webhook:
    post:
      summary: Resend webhook for a test charge (sandbox)
      description: |-
        Resends a webhook for a **test charge** with a simulated status.
        Use this in sandbox to test your webhook handler without waiting for
        real payment events.

        Only works for test-mode charges (created with a sandbox API key).
      tags:
        - Charges
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Test charge ID
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  description: Simulated charge status to use in the webhook payload
                  enum:
                    - paid
                    - pending
                    - refused
                    - failed
                    - refunded
                    - in_analysis
                    - authentication_required
                  example: paid
      responses:
        '200':
          description: Webhook resent successfully
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions or not a test charge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/cards/{id}/activate:
    post:
      summary: Activate a card
      description: |-
        Activates a card that is in `pending_validation` status.

        When a card is registered with `validateCard=true`, a small test transaction
        (up to R$ 2.00) is made. The customer must check their card statement for
        this amount and provide it here to activate the card.

        After successful activation, the test transaction amount is automatically refunded.
      tags:
        - Cards
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique card identifier
          schema:
            type: string
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - activationValue
              properties:
                activationValue:
                  type: string
                  description: |-
                    The test transaction amount shown on the card statement (e.g., "1.50").
                    Enter the exact decimal value, NOT in cents.
                  example: "1.50"
      responses:
        '200':
          description: Card activated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Card ID
                    example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
                  status:
                    type: string
                    example: active
                  message:
                    type: string
                    example: Card activated successfully
        '400':
          description: Invalid activation value or card already active
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Invalid activationValue or card is already activated
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Card not found

components:
  securitySchemes:
    basic:
      type: http
      scheme: basic
      description: |-
        HTTP Basic authentication. Use your secret key as the
        username and an empty string as password. The API key
        should be base64 encoded in the format 'username:' when
        sending the Authorization header.
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |-
        JWT Bearer token authentication. Use the JWT token obtained
        from the login endpoint in the Authorization header as 'Bearer {token}'.
  schemas:
    NewCharge:
      type: object
      required:
        - amount
        - currency
        - customer
        - paymentMethod
        - items
      properties:
        amount:
          type: number
          description: The amount to charge in the currency unit, not cents. (e.g., 10 for 10 BRL)
          example: 10
          minimum: 1
        currency:
          type: string
          description: The ISO 4217 currency code. (e.g., BRL, USD, EUR)
          example: USD
        customer:
          type: object
          description: |-
            Customer data. Provide `id` to reference an existing customer (all other
            fields become optional), or provide `name` + `email` (or `phone`) to
            create/look up a customer inline.
          properties:
            id:
              type: string
              description: |-
                ID of an existing customer. When provided, all other customer fields
                are optional — the existing customer record is used as-is.
              example: "2RhQg9M7ZCg3X3nMb9W1kX8Q"
            name:
              type: string
              description: The name of the customer
              example: John Doe
            email:
              type: string
              description: |-
                The email address of the customer. Required when `id` is not provided
                and `phone` is not provided.
              example: john.doe@example.com
            phone:
              type: string
              description: |-
                The phone number of the customer. Can be used instead of `email`
                when `id` is not provided.
              example: "+1234567890"
            document:
              type: object
              properties:
                type:
                  type: string
                  description: The type of document. Its based on the
                    country of the payment method. (e.g., ARG = dni,cuit; BRA = cnpj)
                  example: dni
                id:
                  type: string
                  description: The document or identification number of the customer
                  example: "12345678900"
            address:
              type: object
              properties:
                country:
                  type: string
                  description: |-
                    The ISO 3166-1 alpha-3 country code. (e.g., BRA, USA, ARG)
                  example: USA
            ipAddress:
              type: string
              description: The IP address of the customer
              example: '127.0.0.1'
        paymentMethod:
          oneOf:
            - title: Credit Card
              type: object
              required:
                - type
                - number
                - holderName
                - expirationMonth
                - expirationYear
                - cvv
                - installments
              properties:
                type:
                  type: string
                  enum:
                    - credit_card
                  description: The payment method type
                  example: credit_card
                number:
                  type: string
                  description: Credit card number. Without spaces.
                  example: "1111222233334444"
                holderName:
                  type: string
                  description: Credit card holder name.
                  example: John Doe
                expirationMonth:
                  type: string
                  description: Credit card expiration month.
                  minLength: 2
                  maxLength: 2
                  example: "10"
                expirationYear:
                  type: string
                  description: Credit card expiration year.
                  minLength: 4
                  maxLength: 4
                  example: "2025"
                cvv:
                  type: string
                  description: Credit card security code.
                  minLength: 3
                  example: "123"
                installments:
                  type: number
                  description: Payment installments quantity.
                  maximum: 12
                  example: 1
                threeDSMode:
                  type: string
                  enum:
                    - managed
                  description: |-
                    Set to `"managed"` to let FastPay handle the 3DS authentication
                    flow automatically (managed 3DS). When set, also provide `browser`.
                    After creation the charge will have status `authentication_required`
                    and the flow continues via POST /v1/charges/{id}/resume-3ds.
                  example: managed
                browser:
                  $ref: '#/components/schemas/BrowserInfo'
                threeDS:
                  $ref: '#/components/schemas/CreditCardThreeDS'
            - title: Credit Card (with saved card)
              type: object
              description: |-
                Pay with a previously saved card using its token ID.
                Get the cardTokenId from POST /v1/cards response (the "id" field).
              required:
                - type
                - cardTokenId
                - cvv
                - installments
              properties:
                type:
                  type: string
                  enum:
                    - credit_card
                  description: The payment method type
                  example: credit_card
                cardTokenId:
                  type: string
                  description: |-
                    ID of a previously saved card (from POST /v1/cards response).
                    The card must be active (not pending activation).
                  example: "2RhQg9M7ZCg3X3nMb9W1kX8Q"
                cvv:
                  type: string
                  description: Credit card security code (required even for saved cards).
                  minLength: 3
                  example: "123"
                installments:
                  type: number
                  description: Payment installments quantity.
                  maximum: 12
                  example: 1
                threeDSMode:
                  type: string
                  enum:
                    - managed
                  description: Set to `"managed"` to use managed 3DS flow. Provide `browser` when using this mode.
                  example: managed
                browser:
                  $ref: '#/components/schemas/BrowserInfo'
                threeDS:
                  $ref: '#/components/schemas/CreditCardThreeDS'
            - title: Credit Card (with Apple Pay wallet)
              type: object
              description: |-
                Pay with an Apple Pay token obtained from the Apple Pay JS API.
                When the `wallet` field is provided, card fields (number, holderName,
                expirationMonth, expirationYear, cvv) are not required — FastPay
                decrypts the Apple Pay token and extracts the card data automatically.
                See the Apple Pay integration guide for the full onboarding flow.
              required:
                - type
                - wallet
                - installments
              properties:
                type:
                  type: string
                  enum:
                    - credit_card
                  description: The payment method type
                  example: credit_card
                installments:
                  type: number
                  description: Payment installments quantity.
                  maxLength: 12
                  example: 1
                wallet:
                  type: object
                  description: Apple Pay wallet payload containing the secure token.
                  required:
                    - type
                    - token
                  properties:
                    type:
                      type: string
                      enum:
                        - applepay
                      description: Wallet type.
                      example: applepay
                    token:
                      type: object
                      description: |-
                        Apple Pay payment token. This is the `payment.token` object
                        returned by the Apple Pay JS API after the user authorizes
                        the payment (event `onpaymentauthorized`). Send the object
                        as-is, without modifications.
                      required:
                        - paymentData
                        - paymentMethod
                        - transactionIdentifier
                      properties:
                        paymentData:
                          type: object
                          description: Encrypted payment data from Apple Pay.
                          required:
                            - data
                            - signature
                            - version
                            - header
                          properties:
                            data:
                              type: string
                              format: byte
                              description: Base64-encoded encrypted payment data.
                              example: "4bh5q3l...base64..."
                            signature:
                              type: string
                              format: byte
                              description: Base64-encoded detached PKCS #7 signature.
                              example: "MIAGCSqGSIb3DQEHAqCAMIACAQExDz...base64..."
                            version:
                              type: string
                              enum:
                                - EC_v1
                              description: Payment token data format version.
                              example: EC_v1
                            header:
                              type: object
                              description: Payment data header with key exchange information.
                              required:
                                - ephemeralPublicKey
                                - publicKeyHash
                                - transactionId
                              properties:
                                ephemeralPublicKey:
                                  type: string
                                  format: byte
                                  description: Base64-encoded ephemeral EC public key (EC_v1).
                                  example: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE...base64..."
                                publicKeyHash:
                                  type: string
                                  format: byte
                                  description: |-
                                    Base64-encoded SHA-256 hash of the X.509 encoded
                                    merchant public key certificate.
                                  example: "Ut4Wu3+Tc7n3Ld5gqkX5lL/YkS3rsX5gA8w...base64..."
                                transactionId:
                                  type: string
                                  description: Hex-encoded transaction identifier.
                                  example: "31323334353637383930"
                        paymentMethod:
                          type: object
                          description: Information about the card used for the payment.
                          required:
                            - displayName
                            - network
                            - type
                          properties:
                            displayName:
                              type: string
                              description: Localized description of the payment method.
                              example: "Visa 1234"
                            network:
                              type: string
                              description: Payment network name.
                              example: "Visa"
                            type:
                              type: string
                              enum:
                                - debit
                                - credit
                                - prepaid
                                - store
                              description: Card type.
                              example: credit
                        transactionIdentifier:
                          type: string
                          description: Unique identifier for this Apple Pay transaction.
                          example: "b1f6f7d2c9a45e3b8b7e2a9d8f0c5e1d4a3b2c1e0d9f8a7b6c5d4e3f2a1b0c9"
            - title: Pix
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - pix
                  description: The payment method type
                  example: pix
                expirationInDays:
                  type: number
                  description: |-
                    Pix expiration in days. Required if `expirationInSeconds` is not provided.
                  minimum: 1
                  example: 1
                expirationInSeconds:
                  type: number
                  description: |-
                    Pix expiration in seconds. Required if `expirationInDays` is not provided.
                    Minimum 900 (15 minutes).
                  minimum: 900
                  example: 3600
            - title: Pix Open Finance
              type: object
              required:
                - type
                - bankName
              properties:
                type:
                  type: string
                  enum:
                    - pix_open_finance
                  description: The payment method type
                  example: pix_open_finance
                bankName:
                  type: string
                  description: The name of the bank for Open Finance routing.
                  example: Nubank
            - title: PSE
              type: object
              required:
                - type
                - bankName
              properties:
                type:
                  type: string
                  enum:
                    - pse
                  description: The payment method type (Colombia PSE)
                  example: pse
                bankName:
                  type: string
                  description: The name of the bank for PSE routing.
                  example: Banco de Bogotá
            - title: Voucher
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - voucher
                  description: The payment method type
                  example: voucher
            - title: Bank Transfer
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - bank_transfer
                  description: The payment method type
                  example: bank_transfer
            - title: Rapipago
              type: object
              required:
                - type
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - rapipago
                  description: The payment method type
                  example: rapipago
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: |-
                    The type of identity document. Required to be 'dni'
                    or 'cuit' if the country is Argentina (ARG).
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
            - title: Khipu
              type: object
              required:
                - type
                - bankName
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - khipu
                  description: The payment method type
                  example: khipu
                bankName:
                  type: string
                  description: The name of the bank
                  example: Bank of America
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: |-
                    The type of identity document. Required to be 'dni'
                    or 'cuit' if the country is Argentina (ARG).
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
            - title: QRCode
              type: object
              required:
                - type
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - qrcode
                  description: The payment method type
                  example: qrcode
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: |-
                    The type of identity document. Required to be 'dni'
                    or 'cuit' if the country is Argentina (ARG).
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
        items:
          description: List of charge items.
          type: array
          items:
            type: object
            required:
              - title
              - type
              - description
              - unit_price
              - quantity
            properties:
              title:
                type: string
                description: Item name
                example: Shoes
              type:
                type: string
                description: Item type. Must be equal to the `product_type`
                  of your **merchant** profile, unless it is configured to both `physical`
                  and `digital`.
                enum: [physical, digital]
              description:
                type: string
                description: Item description
                example: Nike Shoes
              unit_price:
                type: number
                description: Item price. Decimal value.
                example: 199.99
              quantity:
                type: number
                description: Item quantity
                example: 1
        shippingAddress:
          description: |-
            Shipping address details. Required for merchants selling `physical` goods.
          type: object
          required:
            - postalCode
            - addressLine1
            - addressLine2
            - neighborhood
            - city
            - state
            - country
          properties:
            postalCode:
              type: string
              description: ZIP or postal code of the shipping address.
              example: '12345'
            addressLine1:
              type: string
              description: Primary address line, such as street address or P.O. box.
              example: '123 Main St'
            addressLine2:
              type: string
              description: Secondary address line, such as apartment or suite number.
              example: 'Apt 1'
            neighborhood:
              type: string
              description: Neighborhood or district of the shipping address.
              example: 'Downtown'
            city:
              type: string
              description: City of the shipping address.
              example: 'San Francisco'
            state:
              type: string
              description: State, province, or region of the shipping address.
              example: 'CA'
            country:
              type: string
              description: The ISO 3166-1 alpha-3 country code (e.g., USA, BRA, ARG).
              example: 'USA'
        trackingInfo:
          description: Shipping tracking details.
          type: object
          properties:
            trackingCode:
              type: string
              description: Unique code provided by the carrier to track the shipment.
              example: 'TRK123456789'
            shippingProvider:
              type: string
              description: Name of the shipping provider handling the delivery.
              example: 'FedEx'
            trackingUrl:
              type: string
              description: Optional URL where the shipment can be tracked.
              example: 'https://tracking.com/TRK123456789'
            trackingStatus:
              type: string
              description: Current delivery status of the shipment.
              enum: [awaiting_shipment, on_the_way, delivered]
              example: 'on_the_way'
        metadata:
          type: object
          description: Additional metadata to store with the charge.
          example:
            order_id: ORD-123
            product_id: PROD-456
        postbackUrl:
          type: string
          format: uri
          description: |-
            Optional URL that receives **asynchronous** webhook notifications
            for the charge's lifecycle events AFTER creation. This URL is NOT
            used for the synchronous create response.

            Events delivered to this URL:
            - PIX charges: `charge.pending` (QR code created), `charge.paid`
            - Credit card charges: `charge.paid`, `charge.refunded`, `charge.updated`

            The payload format is identical to the registered webhook endpoint
            format (`id`, `event`, `livemode`, `data` with the full charge object).
            Retry logic applies the same exponential backoff as endpoint webhooks.
          example: 'https://merchant.com/webhooks/charge-status'
        split:
          type: array
          description: Array of merchants and percentages participating in Split
          items:
            $ref: '#/components/schemas/Split'
    Charge:
