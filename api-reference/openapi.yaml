openapi: 3.0.0
info:
  title: FastPay API
  version: 1.0.0
  description: |-
    API for creating and managing payment charges.

    ## Authentication

    This API uses **Basic Authentication** for direct API access, such as creating charges.
    Use your API key as the username and an empty string as password.
    The header should be formatted as:

    `Authorization: Basic {base64(apiKey:)}`.

    For example:

    ```
    Authorization: Basic YWxleG91dG9uOiIi
    ```

    ## Webhooks

    FastPay sends webhooks to notify your application about charge status changes in real-time.
    Webhooks are sent via HTTP POST requests to your configured webhook endpoints.

    ### Webhook Events

    The following webhook events are available for charges:

    - `charge.created` - Sent when a new charge is created
    - `charge.pending` - Sent when a charge is pending payment
    - `charge.paid` - Sent when a charge is successfully paid
    - `charge.updated` - Sent when a charge is updated

    ### Webhook Payload Structure

    All webhook payloads follow this structure:

    ```json
    {
      "id": "webhook_event_id",
      "event": "charge.paid",
      "data": {
        // Complete charge object
      }
    }
    ```

    ### Webhook Delivery

    - Webhooks are sent via HTTP POST requests
    - Content-Type: `application/json`
    - Retry logic is implemented for failed deliveries
    - Webhook events are stored in the database for audit purposes
    - Delivery logs are maintained for debugging and monitoring

    ### Webhook Security

    - Webhooks are sent to pre-configured endpoints
    - Endpoints can be enabled/disabled per merchant
    - Event filtering is supported (only receive specific events)
    - Failed deliveries are retried with exponential backoff
servers:
  - url: https://api-global.fastpaybrasil.com
    description: Produção e Sandbox (diferenciados pela API key)
paths:
  /v1/charges:
    post:
      summary: Create a new charge
      description: |-
        Creates a payment charge for a merchant with the
        specified amount, currency, and payment method.
      tags:
        - Charges
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewCharge'
      responses:
        '201':
          description: The charge has been successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedCharge'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 422
                  error:
                    type: string
                    example: Unprocessable Entity
                  message:
                    type: string
                    example: The items list contains one of more items with invalid type.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error
    get:
      summary: Get all charges
      description: Returns a paginated list of charges filtered by the provided criteria.
      tags:
        - Charges
      security:
        - basic: []
      parameters:
        - name: page
          in: query
          description: Page number (starts at 1)
          required: false
          schema:
            type: integer
            example: 1
            default: 1
        - name: size
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            example: 20
            default: 10
        - name: orderBy
          in: query
          description: |-
            Order results by fields (comma-separated).
            Prefix with - for descending order.
          required: false
          schema:
            type: string
            example: createdAt,-amount
        - name: status
          in: query
          description: Filter charges by status
          required: false
          schema:
            type: string
            enum:
              - paid
              - pending
              - refused
              - failed
              - refunded
              - in_analysis
              - authentication_required
            example: paid
        - name: merchantId
          in: query
          description: Filter charges by merchant ID
          required: false
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
      responses:
        '200':
          description: Successfully retrieved the list of charges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChargeList'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
  /v1/wallets:
    get:
      summary: Get merchant wallets
      description: |-
        Returns a list of wallets with balances for the specified merchant,
        optionally filtered by currency.
      tags:
        - Wallets
      security:
        - bearer: []
      parameters:
        - name: merchantId
          in: query
          description: Merchant ID to get wallets for
          required: true
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
        - name: currency
          in: query
          description: Filter wallets by currency code
          required: false
          schema:
            type: string
            example: BRL
      responses:
        '200':
          description: Successfully retrieved the list of wallets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wallet'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
        '404':
          description: Merchant not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Unauthorized
                  error:
                    type: string
                    example: Merchant not found
  /v1/payment-methods:
    get:
      summary: Get available payment methods
      description: |-
        Returns a list of payment methods available for the merchant,
        optionally filtered by currency.
      tags:
        - Payment Methods
      security:
        - basic: []
      parameters:
        - name: merchantId
          in: query
          description: Filter payment methods by merchant ID
          required: false
          schema:
            type: string
            example: 2vorkDcXyvzifL63YX09S9VqcnI
        - name: currency
          in: query
          description: Filter payment methods by currency
          required: false
          schema:
            type: string
            example: USD
      responses:
        '200':
          description: Successfully retrieved the list of payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethod'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
  /v1/submerchants:
    post:
      summary: Create a new Submerchant
      description: |-
        Creates a submerchant FastPay account linked to the MerchantMaster.
      tags:
        - FastConnect
      security:
        - basic: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewSubMerchant'
      responses:
        '201':
          description: The charge has been successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedSubMerchant'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 422
                  error:
                    type: string
                    example: Unprocessable Entity
                  message:
                    type: string
                    example: The items list contains one of more items with invalid type.
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error
    get:
      summary: Get all submerchants
      description: |-
        Get all submerchants related to MerchantMaster
      tags:
        - FastConnect
      security:
        - basic: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filters merchants by current status.
          schema:
            type: string
            enum:
              - active
              - inactive
              - pending
              - rejected
              - blocked
          example: active
        - name: companyTaxId
          in: query
          required: false
          description: Merchant tax identification number (e.g. CNPJ).
          schema:
            type: string
          example: "1234567890"
        - name: legalName
          in: query
          required: false
          description: Merchant legal (registered) name.
          schema:
            type: string
          example: Legal Name
        - name: tradeName
          in: query
          required: false
          description: Merchant trade or business name.
          schema:
            type: string
          example: Trade Name
        - name: createdAt
          in: query
          required: false
          description: Filters merchants created at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: updatedAt
          in: query
          required: false
          description: Filters merchants last updated at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: approvedAt
          in: query
          required: false
          description: Filters merchants approved at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: rejectedAt
          in: query
          required: false
          description: Filters merchants rejected at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: blockedAt
          in: query
          required: false
          description: Filters merchants blocked at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: inactivatedAt
          in: query
          required: false
          description: Filters merchants inactivated at a specific date.
          schema:
            type: string
            format: date
          example: "2021-01-01"
        - name: currency
          in: query
          required: false
          description: Filters merchants by operating currency.
          schema:
            type: string
            example: BRL
        - name: page
          in: query
          description: Page number (starts at 1)
          required: false
          schema:
            type: integer
            example: 1
            default: 1
        - name: size
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            example: 20
            default: 10
        - name: orderBy
          in: query
          description: |-
            Order results by fields (comma-separated).
            Prefix with - for descending order.
          required: false
          schema:
            type: string
            example: legalName,-createdAt
      responses:
        '200':
          description: Successfully retrieved the list of submerchants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSubMerchantList'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: Unauthorized
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 403
                  message:
                    type: string
                    example: Forbidden
  /v1/submerchants/{id}:
