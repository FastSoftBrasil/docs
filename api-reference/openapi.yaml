                  description: Credit card last four digits.
                  example: "7890"
                expirationMonth:
                  type: string
                  description: Credit card expiration month.
                  example: "08"
                expirationYear:
                  type: string
                  description: Credit card expiration year.
                  example: "2024"
                holderName:
                  type: string
                  description: Credit card holdername.
                  example: John Doe
                installments:
                  type: number
                  description: Number of installments used.
                  example: 3
            - title: Rapipago
              type: object
              required:
                - type
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - rapipago
                  description: The payment method type
                  example: rapipago
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: The type of identity document
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
            - title: Khipu
              type: object
              required:
                - type
                - bankName
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - khipu
                  description: The payment method type
                  example: khipu
                bankName:
                  type: string
                  description: The name of the bank
                  example: Bank of America
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: The type of identity document
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
            - title: QRCode
              type: object
              required:
                - type
                - identifyType
                - identifyNumber
              properties:
                type:
                  type: string
                  enum:
                    - qrcode
                  description: The payment method type
                  example: qrcode
                identifyType:
                  type: string
                  enum:
                    - dni
                    - cuit
                    - cuil
                    - cdi
                  description: The type of identity document
                  example: dni
                identifyNumber:
                  type: string
                  description: The identification number
                  example: '12345678'
                  minLength: 8
                  maxLength: 11
        merchantId:
          type: string
          description: The merchant identifier
          example: 2vorkDcXyvzifL63YX09S9VqcnI
        paymentDetails:
          type: object
          nullable: true
          description: |-
            Additional payment details. Its different based on the payment method.
          example:
            authorization_code: '123456'
          oneOf:
            - title: Credit Card
              type: object
              required:
                - firstSix
                - lastFour
                - expirationMonth
                - expirationYear
                - holderName
                - installments
              properties:
                firstSix:
                  type: string
                  description: Credit card first six digits.
                  example: "123456"
                lastFour:
                  type: string
                  description: Credit card last four digits.
                  example: "7890"
                expirationMonth:
                  type: string
                  description: Credit card expiration month.
                  example: "08"
                expirationYear:
                  type: string
                  description: Credit card expiration year.
                  example: "2024"
                holderName:
                  type: string
                  description: Credit card holdername.
                  example: John Doe
