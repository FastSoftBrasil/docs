  /v1/subscriptions/{id}/cancel:
    post:
      summary: Cancel subscription
      description: |-
        Cancels a subscription. Has regret period logic (up to 7 days after creation).

        **Regret Period (up to 7 days):**
        - Full automatic refund
        - Access revoked immediately

        **Regular Cancellation (after 7 days):**
        - No automatic refund
        - Access continues until end of current period
      tags:
        - Subscriptions
      security:
        - basic: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique subscription identifier
          schema:
            type: string
          example: 2RhQg9M7ZCg3X3nMb9W1kX8Q
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Cancellation reason (max 500 characters)
                  example: Customer requested cancellation
                  maxLength: 500
      responses:
        '200':
          description: Subscription successfully cancelled
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CancelSubscriptionRegretResponse'
                  - $ref: '#/components/schemas/CancelSubscriptionRegularResponse'
        '400':
          description: Subscription already cancelled or expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: Subscription already cancelled or expired
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 401
                  message:
