              properties:
                barcode:
                  type: string
                  description: Barcode number. (e.g., "3335008****05200211740749")
                  example: "3335008****05200211740749"
                paymentCode:
                  type: string
                  description: |-
                    The ticket number that the user needs to use for payment.
                  example: "1111111111"
                paymentUrl:
